version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Hold major bumps: they tend to be breaking ports (wgpu, bincode, etc.).
    # Revisit them deliberately (e.g. during the planned overhaul), not weekly.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
