name: Deploy Site

on:
  push:
    branches: [main]

# Allow the job to push to the web branch
permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy docs + demo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # ── Rust / WASM build ──────────────────────────────────────────────────
      - name: Install Rust (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --locked

      - name: Build WASM
        run: |
          cargo build \
            --target wasm32-unknown-unknown \
            --features wasm \
            --release
          wasm-bindgen \
            target/wasm32-unknown-unknown/release/haystackfm.wasm \
            --target web \
            --out-dir web/pkg

      # ── Node / Vite demo build ─────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Build demo
        working-directory: web
        # The demo is served under /<repo>/demo/, so Vite must prefix assets
        # with that path.
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/demo/
        run: npx vite build

      # ── mdBook docs build ──────────────────────────────────────────────────
      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Build docs
        working-directory: docs
        run: mdbook build

      # ── Assemble site (docs at root, demo under /demo) ─────────────────────
      - name: Assemble site
        run: |
          rm -rf site
          cp -r docs/book site
          cp -r web/dist site/demo
          touch site/.nojekyll

      # ── Deploy to web branch ───────────────────────────────────────────────
      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: site
          # Keep a clean branch — no git history bloat from built assets
          force_orphan: true
